name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          archive="kb_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
          workdir="$(mktemp -d)"
          stagedir="${workdir}/kb_${VERSION}_${GOOS}_${GOARCH}"

          mkdir -p "${stagedir}"
          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" go build -trimpath -ldflags="-s -w" -o "${stagedir}/kb" .
          cp README.md "${stagedir}/README.md"

          tar -C "${workdir}" -czf "${GITHUB_WORKSPACE}/${archive}" "$(basename "${stagedir}")"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: kb-${{ matrix.goos }}-${{ matrix.goarch }}
          path: kb_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.tar.gz > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
